<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="1021px" preserveAspectRatio="none" style="width:832px;height:1021px;background:#FFFFFF;" version="1.1" viewBox="0 0 832 1021" width="832px" zoomAndPan="magnify"><?plantuml 1.2026.6?><defs/><g><g class="title" data-source-line="1"><text fill="#111827" font-family="Helvetica" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="261.2627" x="281.8799" y="22.9951">Two hypotheses, two corrections</text></g><!--entity h1--><g class="entity" data-qualified-name="h1" data-source-line="16" id="ent0001"><rect fill="#DBEAFE" height="68.8906" rx="5" ry="5" style="stroke:#4B5563;stroke-width:0.5;" width="241.7441" x="46.82" y="44.2969"/><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="91.0752" x="56.82" y="67.292">Hypothesis 1</text><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="221.7441" x="56.82" y="83.5889">Remove the (N, V) logits matrix</text><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.8828" x="56.82" y="99.8857">to train longer contexts</text></g><!--entity tie--><g class="entity" data-qualified-name="tie" data-source-line="17" id="ent0002"><rect fill="#FECACA" height="68.8906" rx="5" ry="5" style="stroke:#4B5563;stroke-width:0.5;" width="269.0264" x="33.18" y="190.1869"/><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="187.8311" x="43.18" y="213.182">8,192-token training result</text><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="249.0264" x="43.18" y="229.4789">Fused and stock marginal peaks tie</text><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="87.3906" x="43.18" y="245.7757">at 21.39 GiB</text></g><!--entity probe--><g class="entity" data-qualified-name="probe" data-source-line="18" id="ent0003"><rect fill="#FEF3C7" height="68.8906" rx="5" ry="5" style="stroke:#4B5563;stroke-width:0.5;" width="317.2334" x="9.07" y="336.0769"/><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="168.916" x="19.07" y="359.072">Isolated attention probe</text><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2334" x="19.07" y="375.3689">Forward-plus-backward reaches 12.75 GiB</text><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="272.8086" x="19.07" y="391.6657">and grows about 3.7-3.8x per doubling</text></g><!--entity flash--><g class="entity" data-qualified-name="flash" data-source-line="19" id="ent0004"><rect fill="#DCFCE7" height="68.8906" rx="5" ry="5" style="stroke:#4B5563;stroke-width:0.5;" width="321.3828" x="7" y="481.9669"/><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="179.5117" x="17" y="504.962">Implementation response</text><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.3828" x="17" y="521.2589">Tiled FlashAttention forward and backward</text><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="276.3359" x="17" y="537.5557">Saved attention state scales with N x D</text></g><!--entity h2--><g class="entity" data-qualified-name="h2" data-source-line="20" id="ent0005"><rect fill="#DBEAFE" height="68.8906" rx="5" ry="5" style="stroke:#4B5563;stroke-width:0.5;" width="271.46" x="493.96" y="481.9669"/><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="91.0752" x="503.96" y="504.962">Hypothesis 2</text><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="251.46" x="503.96" y="521.2589">The projected duration of the whole</text><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="243.2295" x="503.96" y="537.5557">packed launch chain is the kill unit</text></g><!--entity packing--><g class="entity" data-qualified-name="packing" data-source-line="21" id="ent0006"><rect fill="#FECACA" height="68.8906" rx="5" ry="5" style="stroke:#4B5563;stroke-width:0.5;" width="281.96" x="488.71" y="627.8569"/><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="216.0361" x="498.71" y="650.852">MLX source and packing probe</text><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.96" x="498.71" y="667.1489">Large production ranges each trigger</text><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="187.3115" x="498.71" y="683.4457">a command-buffer commit</text></g><!--entity guard--><g class="entity" data-qualified-name="guard" data-source-line="22" id="ent0007"><rect fill="#DCFCE7" height="68.8906" rx="5" ry="5" style="stroke:#4B5563;stroke-width:0.5;" width="307.7656" x="475.81" y="773.7469"/><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="118.2959" x="485.81" y="796.742">Guard correction</text><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.7656" x="485.81" y="813.0389">Budget each command buffer separately</text><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="247.0371" x="485.81" y="829.3357">Keep the safety margin unchanged</text></g><!--entity sweep--><g class="entity" data-qualified-name="sweep" data-source-line="23" id="ent0008"><rect fill="#EDE9FE" height="68.8906" rx="5" ry="5" style="stroke:#4B5563;stroke-width:0.5;" width="239.5088" x="509.94" y="919.6369"/><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.0947" x="519.94" y="942.632">Source-reported later sweep</text><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="219.5088" x="519.94" y="958.9289">23,040 tokens on flash + fused</text><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="218.668" x="519.94" y="975.2257">7,936 tokens on the stock path</text></g><!--link h1 to tie--><g class="link" data-entity-1="ent0001" data-entity-2="ent0002" data-link-type="dependency" data-source-line="25" id="lnk9"><path d="M167.69,113.4769 C167.69,136.5669 167.69,162.0569 167.69,185.1069" fill="none" id="h1-to-tie" style="stroke:#4B5563;stroke-width:1;"/><polygon fill="#4B5563" points="167.69,190.1069,171.69,181.1069,167.69,185.1069,163.69,181.1069,167.69,190.1069" style="stroke:#4B5563;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#374151" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="65.2349" x="168.69" y="156.2538">measured</text></g><!--link tie to probe--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="26" id="lnk10"><path d="M167.69,259.3669 C167.69,282.4569 167.69,307.9469 167.69,330.9969" fill="none" id="tie-to-probe" style="stroke:#4B5563;stroke-width:1;"/><polygon fill="#4B5563" points="167.69,335.9969,171.69,326.9969,167.69,330.9969,163.69,326.9969,167.69,335.9969" style="stroke:#4B5563;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#374151" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="156.9204" x="168.69" y="302.1438">investigate shared peak</text></g><!--link probe to flash--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="27" id="lnk11"><path d="M167.69,405.2569 C167.69,428.3469 167.69,453.8369 167.69,476.8869" fill="none" id="probe-to-flash" style="stroke:#4B5563;stroke-width:1;"/><polygon fill="#4B5563" points="167.69,481.8869,171.69,472.8869,167.69,476.8869,163.69,472.8869,167.69,481.8869" style="stroke:#4B5563;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#374151" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="146.3643" x="168.69" y="448.0338">change the bottleneck</text></g><!--link flash to h2--><g class="link" data-entity-1="ent0004" data-entity-2="ent0005" data-link-type="dependency" data-source-line="28" id="lnk12"><path d="M328.63,516.4069 C382.4,516.4069 436.78,516.4069 488.48,516.4069" fill="none" id="flash-to-h2" style="stroke:#4B5563;stroke-width:1;"/><polygon fill="#4B5563" points="493.48,516.4069,484.48,512.4069,488.48,516.4069,484.48,520.4069,493.48,516.4069" style="stroke:#4B5563;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#374151" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="129.27" x="346.67" y="509.4738">exposes a new limit</text></g><!--link h2 to packing--><g class="link" data-entity-1="ent0005" data-entity-2="ent0006" data-link-type="dependency" data-source-line="29" id="lnk13"><path d="M629.69,551.1469 C629.69,574.2369 629.69,599.7269 629.69,622.7769" fill="none" id="h2-to-packing" style="stroke:#4B5563;stroke-width:1;"/><polygon fill="#4B5563" points="629.69,627.7769,633.69,618.7769,629.69,622.7769,625.69,618.7769,629.69,627.7769" style="stroke:#4B5563;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#374151" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="185.3325" x="630.69" y="593.9238">inspect submission behavior</text></g><!--link packing to guard--><g class="link" data-entity-1="ent0006" data-entity-2="ent0007" data-link-type="dependency" data-source-line="30" id="lnk14"><path d="M629.69,697.0369 C629.69,720.1269 629.69,745.6169 629.69,768.6669" fill="none" id="packing-to-guard" style="stroke:#4B5563;stroke-width:1;"/><polygon fill="#4B5563" points="629.69,773.6669,633.69,764.6669,629.69,768.6669,625.69,764.6669,629.69,773.6669" style="stroke:#4B5563;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#374151" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="116.1113" x="630.69" y="739.8138">correct the model</text></g><!--link guard to sweep--><g class="link" data-entity-1="ent0007" data-entity-2="ent0008" data-link-type="dependency" data-source-line="31" id="lnk15"><path d="M629.69,842.9269 C629.69,866.0169 629.69,891.5069 629.69,914.5569" fill="none" id="guard-to-sweep" style="stroke:#4B5563;stroke-width:1;"/><polygon fill="#4B5563" points="629.69,919.5569,633.69,910.5569,629.69,914.5569,625.69,910.5569,629.69,919.5569" style="stroke:#4B5563;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#374151" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="162.0684" x="630.69" y="885.7038">measure after correction</text></g><g class="caption" data-source-line="33"><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="694.2031" x="65.4097" y="1010.5226">Conceptual evidence sequence. Values are source-reported; this is not an allocation-lifetime trace.</text></g><?plantuml-src TLLDRziu4BthLmoQonPh6P6Tr8aNMC1shBPecqDR53teGaiZYJL5QlbXEIZwtpkaf5HfiuOF9cVuvirxGzfoAn0-TmhgXrRP6WsQ6LXQvqfhp2rNqaIHENBPCiqQEB3yM6dbPB5JGccuICDdac5gLgYEomfA9WnE8iCnBL53SZa955Wo9sogfBrd3S8R52UqF6VFvmoLaoIvMQmcAHkjLJS4hxRNrw-MlmSdfvUhg-GwcRAZRfciI8xl4S1MwGBrKp20FwjJvX-AtAIRT1VzYA9Va2_U3F9o0qacFsAZJWYq0N_Tp-3BIn2gujP0mwpcvqnQ1LOpBcbVLYHNJeNnRCqBO0Rg12xkjljDkfzMk9abjulOgYFA_gotGACXqJAPEeC5C5c0iIe_KXrTSSa4jCYE1Yp7J38BYsI-l8NNV1lgq2vrizzjTfjfeRT62MOzdBKe_OH0gzM145AbEwQBk1NEn7vI_8eui9mwXsGnNrrxS2f5H4YppW0xA6TXEL_5o_dDcUXeA9Gx228VE0Hapo9TxbPFM3Ijm8Rgiy206crfL8d4Pow8MogOgJUF1CkUML1W99R9J-pqf0r3O0WcPuBeTjpMS0zdk0j4IWz8kk_ItNxrFyukg3fPIfo_KPoW2wTxUgeCPdUr4aIn9GOK5Sp9l8QyzaRJSPznv4A0azpsJY-US_h3-wzWbDCvXduyclTwCE4zMHiu52xlfQ5Zr8ztWGQ3LpHFv02DLDFGyVZWoZ9CMDCCLKV0Pxn_xRoAlzw6J6vTK