<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="546px" preserveAspectRatio="none" style="width:1027px;height:546px;background:#FFFFFF;" version="1.1" viewBox="0 0 1027 546" width="1027px" zoomAndPan="magnify"><?plantuml 1.2026.6?><defs/><g><g class="title" data-source-line="1"><text fill="#111827" font-family="Helvetica" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="450.3994" x="285.1289" y="22.9951">Command-buffer packing at the flagship attention shape</text></g><!--cluster rule--><g class="cluster" data-qualified-name="rule" data-source-line="16" id="ent0001"><rect fill="#DBEAFE" height="468.67" rx="5" ry="5" style="stroke:#4B5563;stroke-width:1;" width="852" x="84.3286" y="44.2969"/><text fill="#111827" font-family="Helvetica" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="599.5186" x="210.5693" y="59.292">MLX 0.32.0 commit check on applegpu_g13s, after each encoded operation:</text><text fill="#111827" font-family="Helvetica" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="425.3662" x="297.6455" y="75.5889">commit when ops &gt; 50 or floor(elements / 2^20) &gt; 50</text></g><!--cluster laneA--><g class="cluster" data-qualified-name="rule.laneA" data-source-line="18" id="ent0002"><rect fill="#F8FAFC" height="168.48" rx="5" ry="5" style="stroke:#4B5563;stroke-width:1;" width="788" x="116.3286" y="111.2969"/><text fill="#111827" font-family="Helvetica" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="324.9258" x="347.8657" y="126.292">Large backward dispatches (dK/dV class)</text></g><!--cluster laneB--><g class="cluster" data-qualified-name="rule.laneB" data-source-line="23" id="ent0005"><rect fill="#F8FAFC" height="152.19" rx="5" ry="5" style="stroke:#4B5563;stroke-width:1;" width="685" x="219.3286" y="328.7769"/><text fill="#111827" font-family="Helvetica" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="309.7773" x="406.9399" y="343.772">Small forward dispatches (scalar class)</text></g><!--entity a1--><g class="entity" data-qualified-name="rule.laneA.a1" data-source-line="19" id="ent0003"><rect fill="#FECACA" height="101.4844" rx="5" ry="5" style="stroke:#4B5563;stroke-width:0.5;" width="283.1357" x="140.7586" y="154.2969"/><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="118.3916" x="150.7586" y="177.292">Command buffer</text><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="196.5674" x="150.7586" y="193.5889">possible smaller prefix work</text><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.0625" x="150.7586" y="209.8857">then dK/dV range 1</text><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.1357" x="150.7586" y="226.1826">~118 M unique elements = 112 units</text><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="200.4434" x="150.7586" y="242.4795">over the limit after encoding</text></g><!--entity a2--><g class="entity" data-qualified-name="rule.laneA.a2" data-source-line="20" id="ent0004"><rect fill="#FECACA" height="101.4844" rx="5" ry="5" style="stroke:#4B5563;stroke-width:0.5;" width="255.375" x="605.6386" y="154.2969"/><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="118.3916" x="615.6386" y="177.292">Command buffer</text><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="196.5674" x="615.6386" y="193.5889">possible smaller prefix work</text><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.0625" x="615.6386" y="209.8857">then dK/dV range 2</text><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="235.375" x="615.6386" y="226.1826">counters reset, buffers recounted</text><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="158.4434" x="615.6386" y="242.4795">crosses the limit again</text></g><!--entity b1--><g class="entity" data-qualified-name="rule.laneB.b1" data-source-line="24" id="ent0006"><rect fill="#DCFCE7" height="85.1875" rx="5" ry="5" style="stroke:#4B5563;stroke-width:0.5;" width="329.3262" x="243.6686" y="371.7769"/><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="118.3916" x="253.6686" y="394.772">Command buffer</text><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="309.3262" x="253.6686" y="411.0689">range 1: ~48 units, shared q k v count once</text><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="240.0166" x="253.6686" y="427.3657">each later range adds ~0.46 units</text><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="274.5107" x="253.6686" y="443.6626">counter crosses 50 near the fifth range</text></g><!--entity b2--><g class="entity" data-qualified-name="rule.laneB.b2" data-source-line="25" id="ent0007"><rect fill="#DCFCE7" height="68.8906" rx="5" ry="5" style="stroke:#4B5563;stroke-width:0.5;" width="158.4551" x="702.0986" y="379.9269"/><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="118.3916" x="712.0986" y="402.922">Command buffer</text><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="138.4551" x="712.0986" y="419.2189">the next 4-6 ranges</text><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.0352" x="712.0986" y="435.5157">pack the same way</text></g><!--link laneA to laneB--><!--link a1 to a2--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="30" id="lnk9"><path d="M424.0986,205.0369 C482.0786,205.0369 543.6686,205.0369 600.1686,205.0369" fill="none" id="a1-to-a2" style="stroke:#4B5563;stroke-width:1;"/><polygon fill="#4B5563" points="605.1686,205.0369,596.1686,201.0369,600.1686,205.0369,596.1686,209.0369,605.1686,205.0369" style="stroke:#4B5563;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#374151" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="145.8755" x="442.2686" y="183.1038">range triggers commit</text><text fill="#374151" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="118.314" x="456.0494" y="198.2366">after it is encoded</text></g><!--link b1 to b2--><g class="link" data-entity-1="ent0006" data-entity-2="ent0007" data-link-type="dependency" data-source-line="31" id="lnk10"><path d="M573.2886,414.3769 C617.9486,414.3769 659.2786,414.3769 696.8486,414.3769" fill="none" id="b1-to-b2" style="stroke:#4B5563;stroke-width:1;"/><polygon fill="#4B5563" points="701.8486,414.3769,692.8486,410.3769,696.8486,414.3769,692.8486,418.3769,701.8486,414.3769" style="stroke:#4B5563;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#374151" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="82.8179" x="596.3902" y="392.4438">commit near</text><text fill="#374151" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="93.501" x="591.0486" y="407.5766">the fifth range</text></g><g class="caption" data-source-line="33"><text fill="#111827" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="1018.6572" x="1" y="534.962">Accounting model derived from pinned MLX 0.32.0 source. Element counts are source-reported arithmetic, not a Metal command-buffer capture.</text></g><?plantuml-src hLJHJjim57tFLrp12qYqD6aB26b8RMarQR2NITEaTPjkavl4gcC7sscP9lZsNSTX2p29b_MfyVKzFZxd-3hX9C52LnMgRB1fyfmCr9XkXIe07RYI89TOs5BK_Er8EQ4Ls19hYYBBsseqMC66MmgZ